<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流光一站式AI漫剧创作平台</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="top-nav__inner">
        <div class="top-nav__left">
          <a href="index.html" class="logo" aria-label="DashNova 首页">
            <svg
              class="logo__mark"
              width="44"
              height="44"
              viewBox="0 0 100 100"
              role="img"
              aria-hidden="true"
            >
              <defs>
                <linearGradient
                  id="logoMarkGradient"
                  x1="0"
                  y1="0"
                  x2="100"
                  y2="0"
                  gradientUnits="userSpaceOnUse"
                >
                  <stop offset="0%" stop-color="#4facfe" />
                  <stop offset="100%" stop-color="#bc29ff" />
                </linearGradient>
              </defs>
              <!-- 透明背景，仅保留渐变图形 -->
              <g fill="url(#logoMarkGradient)">
                <!-- 8 个圆角方块：4x4 环状排列 -->
                <rect x="33.5" y="12.5" width="12" height="12" rx="3.2" />
                <rect x="54.5" y="12.5" width="12" height="12" rx="3.2" />
                <rect x="12.5" y="33.5" width="12" height="12" rx="3.2" />
                <rect x="75.5" y="33.5" width="12" height="12" rx="3.2" />
                <rect x="12.5" y="54.5" width="12" height="12" rx="3.2" />
                <rect x="75.5" y="54.5" width="12" height="12" rx="3.2" />
                <rect x="33.5" y="75.5" width="12" height="12" rx="3.2" />
                <rect x="54.5" y="75.5" width="12" height="12" rx="3.2" />
                <!-- 中心四尖星形（星形线 / 内凹四尖） -->
                <path
                  d="M66,50L65.77,50.02L65.1,50.12L64.02,50.39L62.62,50.9L60.98,51.68L59.2,52.74L57.39,54.09L55.66,55.66L54.09,57.39L52.74,59.2L51.68,60.98L50.9,62.62L50.39,64.02L50.12,65.1L50.02,65.77L50,66L49.98,65.77L49.88,65.1L49.61,64.02L49.1,62.62L48.32,60.98L47.26,59.2L45.91,57.39L44.34,55.66L42.61,54.09L40.8,52.74L39.02,51.68L37.38,50.9L35.98,50.39L34.9,50.12L34.23,50.02L34,50L34.23,49.98L34.9,49.88L35.98,49.61L37.38,49.1L39.02,48.32L40.8,47.26L42.61,45.91L44.34,44.34L45.91,42.61L47.26,40.8L48.32,39.02L49.1,37.38L49.61,35.98L49.88,34.9L49.98,34.23L50,34L50.02,34.23L50.12,34.9L50.39,35.98L50.9,37.38L51.68,39.02L52.74,40.8L54.09,42.61L55.66,44.34L57.39,45.91L59.2,47.26L60.98,48.32L62.62,49.1L64.02,49.61L65.1,49.88L65.77,49.98L66,50Z"
                />
              </g>
            </svg>
            <span class="logo__wordmark">DashNova</span>
          </a>
        </div>
        <nav class="top-nav__right" aria-label="主导航">
          <span class="link-plain link-plain--current" aria-current="page">登录</span>
          <a href="register.html" class="btn-register">注册</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="login-card">
        <div class="login-card__header">
          <h1 class="login-card__title">登录DashNova</h1>
          <p class="login-card__subtitle">开始你的 AI 漫剧创作</p>
        </div>

        <form class="login-form" action="#" method="post" novalidate>
          <div class="field">
            <label class="field__label" for="username">用户名</label>
            <input
              id="username"
              name="username"
              type="text"
              class="field__input"
              placeholder="请输入用户名"
              autocomplete="username"
            />
          </div>
          <div class="field">
            <label class="field__label" for="password">密码</label>
            <input
              id="password"
              name="password"
              type="password"
              class="field__input"
              placeholder="请输入密码"
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn-login">登录</button>
        </form>

        <p class="login-card__hint">
          还没有账户？<a href="register.html" class="link-primary">立即注册</a>
        </p>
        <a href="index.html" class="login-card__back">← 返回首页</a>
      </div>
    </main>
  </body>
</html>
