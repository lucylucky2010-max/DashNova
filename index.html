    <header class="top-nav">
      <div class="top-nav__inner">
        <div class="top-nav__left">
          <a href="index.html" class="logo" aria-label="DashNova 首页">
            <img class="logo__mark" src="logo.svg" width="44" height="44" alt="DashNova 标志" />
            <span class="logo__wordmark">DashNova</span>
          </a>
        </div>
      </div>
    </header>

    <main class="page-main">
      <div class="login-card">
        <div class="login-card__header">
          <h1 class="login-card__title">登录流光</h1>
          <p class="login-card__subtitle">开始你的 AI 漫剧创作</p>
        </div>

        <form class="login-form" action="#" method="post" novalidate>
          <div class="field">
            <label class="field__label" for="login-user">登录用户</label>
            <select
              id="login-user"
              name="username"
              class="field__input field__input--select"
              autocomplete="username"
              aria-label="选择登录用户"
            >
              <option value="Super" selected>Super</option>
              <option value="Admin">Admin</option>
              <option value="user">User</option>
            </select>
          </div>
          <div class="field password-field">
            <label class="field__label" for="password">密码</label>
            <div class="password-input-wrap">
              <input
                id="password"
                name="password"
                type="password"
                class="field__input"
                placeholder="请输入密码"
                autocomplete="current-password"
                minlength="6"
                maxlength="20"
                value="123456"
              />
              <button
                type="button"
                id="pw-toggle"
                class="pw-toggle"
                aria-label="显示密码"
                aria-pressed="false"
              >
                <svg
                  class="pw-icon pw-icon--off"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M2 2l20 20" />
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  class="pw-icon pw-icon--on"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-login">登录</button>
        </form>
      </div>
    </main>
    <script>
      (function () {
        try {
          if (new URLSearchParams(window.location.search).get("logout") === "1") {
            sessionStorage.removeItem("dashnova_login_user");
            if (window.history && window.history.replaceState)
              window.history.replaceState({}, "", "index.html");
          }
        } catch (e) {}

        const passwordInput = document.getElementById("password");
        const toggleBtn = document.getElementById("pw-toggle");

        const eyeOn = toggleBtn.querySelector(".pw-icon--on");
        const eyeOff = toggleBtn.querySelector(".pw-icon--off");

        function setIcon(isShown) {
          if (eyeOn) eyeOn.style.display = isShown ? "block" : "none";
          if (eyeOff) eyeOff.style.display = isShown ? "none" : "block";
          toggleBtn.setAttribute("aria-pressed", String(isShown));
          toggleBtn.setAttribute("aria-label", isShown ? "隐藏密码" : "显示密码");
        }

        toggleBtn.addEventListener("pointerdown", (e) => {
          e.preventDefault();
        });

        toggleBtn.addEventListener("click", () => {
          const isText = passwordInput.type === "text";
          passwordInput.type = isText ? "password" : "text";
          setIcon(!isText);
        });

        // 初始化图标：默认密码隐藏
        setIcon(false);

        document
          .querySelector(".login-form")
          .addEventListener("submit", function (e) {
            e.preventDefault();
            var loginUser = document.getElementById("login-user");
            try {
              if (loginUser) sessionStorage.setItem("dashnova_login_user", loginUser.value);
            } catch (err) {}
            window.location.href = "main.html";
          });
      })();
    </script>
  </body>
</html>
