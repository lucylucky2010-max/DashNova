<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流光一站式AI漫剧创作平台</title>
    <link rel="icon" href="favicon.svg?v=20260320" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="top-nav__inner">
        <div class="top-nav__left">
          <a href="index.html" class="logo" aria-label="DashNova 首页">
            <img class="logo__mark" src="logo.svg" width="44" height="44" alt="DashNova 标志" />
            <span class="logo__wordmark">DashNova</span>
          </a>
        </div>
        <nav class="top-nav__right" aria-label="主导航">
          <span class="link-plain link-plain--current" aria-current="page">登录</span>
          <a href="register.html" class="btn-register">注册</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="login-card">
        <div class="login-card__header">
          <h1 class="login-card__title">登录流光</h1>
          <p class="login-card__subtitle">开始你的 AI 漫剧创作</p>
        </div>

        <form class="login-form" action="#" method="post" novalidate>
          <div class="field">
            <label class="field__label" for="username">用户名</label>
            <input
              id="username"
              name="username"
              type="text"
              class="field__input"
              placeholder="请输入用户名"
              autocomplete="username"
            />
          </div>
          <div class="field">
            <label class="field__label" for="password">密码</label>
            <input
              id="password"
              name="password"
              type="password"
              class="field__input"
              placeholder="请输入密码"
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn-login">登录</button>
        </form>

        <p class="login-card__hint">
          还没有账户？<a href="register.html" class="link-primary">立即注册</a>
        </p>
        <a href="index.html" class="login-card__back">← 返回首页</a>
      </div>
    </main>
  </body>
</html>
