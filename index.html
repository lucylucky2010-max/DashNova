<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流光一站式AI漫剧创作平台</title>
    <link rel="icon" href="favicon.svg?v=20260320-1" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="top-nav__inner">
        <div class="top-nav__left">
          <a href="index.html" class="logo" aria-label="DashNova 首页">
            <img class="logo__mark" src="logo.svg" width="44" height="44" alt="DashNova 标志" />
            <span class="logo__wordmark">DashNova</span>
          </a>
        </div>
        <nav class="top-nav__right" aria-label="主导航">
          <span class="link-plain link-plain--current" aria-current="page">登录</span>
          <a href="register.html" class="btn-register">注册</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="login-card">
        <div class="login-card__header">
          <h1 class="login-card__title">登录流光</h1>
          <p class="login-card__subtitle">开始你的 AI 漫剧创作</p>
        </div>

        <form class="login-form" action="#" method="post" novalidate>
          <div class="field">
            <label class="field__label" for="username">用户名</label>
            <input
              id="username"
              name="username"
              type="text"
              class="field__input"
              placeholder="请输入用户名"
              autocomplete="username"
            />
          </div>
          <div class="field password-field">
            <label class="field__label" for="password">密码</label>
            <div class="password-input-wrap">
              <input
                id="password"
                name="password"
                type="password"
                class="field__input"
                placeholder="请输入密码"
                autocomplete="current-password"
                minlength="8"
                maxlength="20"
              />
              <button
                type="button"
                id="pw-toggle"
                class="pw-toggle"
                aria-label="显示密码"
                aria-pressed="false"
              >
                <svg
                  class="pw-icon pw-icon--off"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M2 2l20 20" />
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  class="pw-icon pw-icon--on"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-login">登录</button>
        </form>

        <p class="login-card__hint">
          还没有账户？<a href="register.html" class="link-primary">立即注册</a>
        </p>
        <a href="index.html" class="login-card__back">← 返回首页</a>
      </div>
    </main>
    <script>
      (function () {
        const passwordInput = document.getElementById("password");
        const toggleBtn = document.getElementById("pw-toggle");

        const eyeOn = toggleBtn.querySelector(".pw-icon--on");
        const eyeOff = toggleBtn.querySelector(".pw-icon--off");

        function setIcon(isShown) {
          if (eyeOn) eyeOn.style.display = isShown ? "block" : "none";
          if (eyeOff) eyeOff.style.display = isShown ? "none" : "block";
          toggleBtn.setAttribute("aria-pressed", String(isShown));
          toggleBtn.setAttribute("aria-label", isShown ? "隐藏密码" : "显示密码");
        }

        toggleBtn.addEventListener("pointerdown", (e) => {
          e.preventDefault();
        });

        toggleBtn.addEventListener("click", () => {
          const isText = passwordInput.type === "text";
          passwordInput.type = isText ? "password" : "text";
          setIcon(!isText);
        });

        // 初始化图标：默认密码隐藏
        setIcon(false);

        document
          .querySelector(".login-form")
          .addEventListener("submit", function (e) {
            e.preventDefault();
            window.location.href = "main.html";
          });
      })();
    </script>
  </body>
</html>
