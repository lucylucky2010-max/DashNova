<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>资产中心 — 流光AI漫剧创作平台</title>
    <link rel="icon" href="favicon.svg?v=20260320-1" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="app-nav.css" />
    <style>
      .asset-layout {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        gap: 0;
        min-height: calc(100vh - 56px);
      }

      /* ===== 左侧文件夹侧栏 ===== */
      .folder-sidebar {
        width: 180px;
        flex-shrink: 0;
        border-right: 1px solid var(--input-border);
        padding: 28px 0;
      }

      .folder-sidebar__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px 12px 0;
        margin-bottom: 4px;
      }

      .folder-sidebar__title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
      }

      .folder-sidebar__add {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: none;
        background: #3651d3;
        color: #fff;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .folder-sidebar__add:hover {
        background: #2b42b0;
      }

      .folder-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .folder-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        border-radius: 8px;
        margin-right: 12px;
        cursor: pointer;
        border: none;
        background: none;
        font-family: inherit;
        width: calc(100% - 12px);
        text-align: left;
        transition: color 0.12s ease, background 0.12s ease;
      }

      .folder-item:hover {
        color: var(--text-title);
        background: rgba(0, 0, 0, 0.04);
      }

      .folder-item--active {
        color: #3651d3;
        background: rgba(54, 81, 211, 0.08);
      }

      .folder-item__icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      /* ===== 右侧内容区 ===== */
      .asset-content {
        flex: 1;
        min-width: 0;
        padding: 28px 0 48px 28px;
      }

      .asset-header {
        margin-bottom: 8px;
      }

      .asset-header__title {
        font-size: 22px;
        font-weight: 700;
        color: var(--text-title);
        margin: 0 0 4px;
      }

      .asset-header__desc {
        font-size: 13px;
        color: var(--text-muted);
        margin: 0 0 6px;
      }

      .asset-header__note {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        color: #9ca3af;
        margin: 0 0 20px;
      }

      .asset-header__note-icon {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      .asset-header__note a,
      .asset-header__desc a {
        color: #3651d3;
        text-decoration: none;
      }

      .asset-header__note a:hover,
      .asset-header__desc a:hover {
        text-decoration: underline;
      }

      /* 工具栏：标签 + 操作按钮 */
      .asset-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .asset-tabs {
        display: flex;
        gap: 0;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        overflow: hidden;
      }

      .asset-tab {
        padding: 7px 20px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        background: #fff;
        border: none;
        border-right: 1px solid var(--input-border);
        cursor: pointer;
        font-family: inherit;
        transition: color 0.12s ease, background 0.12s ease;
      }

      .asset-tab:last-child {
        border-right: none;
      }

      .asset-tab:hover {
        color: var(--text-title);
        background: rgba(0, 0, 0, 0.03);
      }

      .asset-tab--active {
        color: var(--text-title);
        background: var(--bg-page);
        font-weight: 600;
      }

      .asset-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn-outline {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 16px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        color: var(--text-title);
        background: #fff;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        transition: border-color 0.12s ease, background 0.12s ease;
      }

      .btn-outline:hover {
        border-color: #d1d5db;
        background: rgba(0, 0, 0, 0.02);
      }

      .btn-outline__icon {
        width: 15px;
        height: 15px;
      }

      .btn-action {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 16px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        color: #fff;
        background: #3651d3;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.12s ease;
      }

      .btn-action:hover {
        background: #2b42b0;
      }

      /* 分类小标题 */
      .section-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-title);
        margin-bottom: 16px;
      }

      .section-label__count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        background: var(--bg-page);
        border-radius: 5px;
      }

      /* 角色/场景卡片网格 */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 36px;
      }

      .asset-card {
        background: #fff;
        border: 1px solid var(--input-border);
        border-radius: 14px;
        overflow: hidden;
        transition: box-shadow 0.15s ease, transform 0.15s ease;
      }

      .asset-card:hover {
        box-shadow: 0 8px 24px -4px rgba(0, 0, 0, 0.1);
        transform: translateY(-2px);
      }

      .asset-card__image {
        width: 100%;
        aspect-ratio: 1 / 1;
        background: linear-gradient(135deg, #e0e7ff 0%, #f0e6ff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .asset-card__image-placeholder {
        width: 48px;
        height: 48px;
        color: #a5b4fc;
      }

      .asset-card__body {
        padding: 14px;
      }

      .asset-card__name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-title);
        margin: 0 0 2px;
      }

      .asset-card__meta {
        font-size: 12px;
        color: #9ca3af;
        margin: 0 0 12px;
      }

      .asset-card__row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .asset-card__field {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .asset-card__status {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        color: #22c55e;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #22c55e;
      }

      .asset-card__actions {
        display: flex;
        gap: 6px;
        margin-top: 10px;
      }

      .card-btn {
        flex: 1;
        padding: 6px 0;
        font-size: 12px;
        font-weight: 500;
        font-family: inherit;
        text-align: center;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.12s ease;
      }

      .card-btn--primary {
        color: #3651d3;
        background: rgba(54, 81, 211, 0.08);
        border: none;
      }

      .card-btn--primary:hover {
        background: rgba(54, 81, 211, 0.14);
      }

      .card-btn--ghost {
        color: var(--text-muted);
        background: transparent;
        border: 1px solid var(--input-border);
      }

      .card-btn--ghost:hover {
        color: var(--text-title);
        border-color: #d1d5db;
      }

      /* 开关（复用） */
      .toggle-sm {
        position: relative;
        width: 28px;
        height: 16px;
        flex-shrink: 0;
      }

      .toggle-sm input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .toggle-sm__track {
        position: absolute;
        inset: 0;
        background: #d1d5db;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .toggle-sm__track::after {
        content: "";
        position: absolute;
        left: 2px;
        top: 2px;
        width: 12px;
        height: 12px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s ease;
      }

      .toggle-sm input:checked + .toggle-sm__track {
        background: #3651d3;
      }

      .toggle-sm input:checked + .toggle-sm__track::after {
        transform: translateX(12px);
      }

      @media (max-width: 900px) {
        .card-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .asset-toolbar {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      @media (max-width: 640px) {
        .asset-layout {
          flex-direction: column;
          padding: 0 16px;
        }

        .folder-sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid var(--input-border);
          padding: 16px 0;
        }

        .folder-list {
          flex-direction: row;
          gap: 4px;
        }

        .folder-item {
          margin-right: 0;
          width: auto;
        }

        .asset-content {
          padding: 20px 0 40px;
        }

        .card-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

    <script>
      (function () {
        // 标签切换
        var tabs = document.querySelectorAll(".asset-tab");
        tabs.forEach(function (tab) {
          tab.addEventListener("click", function () {
            tabs.forEach(function (t) { t.classList.remove("asset-tab--active"); });
            this.classList.add("asset-tab--active");
          });
        });

        // 文件夹切换
        var folders = document.querySelectorAll(".folder-item");
        folders.forEach(function (f) {
          f.addEventListener("click", function () {
            folders.forEach(function (i) { i.classList.remove("folder-item--active"); });
            this.classList.add("folder-item--active");
          });
        });

        // 用户菜单
        var menu = document.getElementById("user-menu");
        var trigger = document.getElementById("user-trigger");
        trigger.addEventListener("click", function (e) {
          e.stopPropagation();
          var open = menu.classList.toggle("open");
          trigger.setAttribute("aria-expanded", String(open));
        });
        document.addEventListener("click", function () {
          menu.classList.remove("open");
          trigger.setAttribute("aria-expanded", "false");
        });
      })();
    </script>
  </body>
</html>
