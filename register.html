<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>创建账户 — 流光AI漫剧创作平台</title>
    <link rel="icon" href="favicon.svg?v=20260320-1" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="top-nav__inner">
        <div class="top-nav__left">
          <a href="index.html" class="logo" aria-label="DashNova 首页">
            <img class="logo__mark" src="logo.svg" width="44" height="44" alt="DashNova 标志" />
            <span class="logo__wordmark">DashNova</span>
          </a>
        </div>
        <nav class="top-nav__right" aria-label="主导航">
          <a href="index.html" class="link-plain">登录</a>
          <span class="btn-register btn-register--current" aria-current="page">注册</span>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="login-card">
        <div class="login-card__header">
          <h1 class="login-card__title">注册流光账号</h1>
        </div>

        <form class="login-form" action="#" method="post" novalidate>
          <div class="field">
            <label class="field__label" for="reg-username">用户名</label>
            <input
              id="reg-username"
              name="username"
              type="text"
              class="field__input"
              placeholder="请输入用户名"
              autocomplete="username"
            />
          </div>
          <div class="field password-field">
            <label class="field__label" for="reg-password">密码</label>
            <div class="password-input-wrap">
              <input
                id="reg-password"
                name="password"
                type="password"
                class="field__input"
                placeholder="请输入密码"
                autocomplete="new-password"
                minlength="8"
                maxlength="20"
              />
              <button
                type="button"
                id="reg-pw-toggle"
                class="pw-toggle"
                aria-label="显示密码"
                aria-pressed="false"
              >
                <svg
                  class="pw-icon pw-icon--off"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M2 2l20 20" />
                  <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
                  <path d="M9.88 9.88A3 3 0 0 1 12 9a3 3 0 0 1 3 3" />
                  <path d="M6.16 6.16C2.75 8.76 2 12 2 12s2.73 5 10 5c1.54 0 2.9-.23 4.08-.62" />
                  <path d="M14.12 14.12A3 3 0 0 0 16 12a3 3 0 0 0-3-3c-.84 0-1.6.34-2.16.88" />
                  <path d="M19.84 17.84C21.25 16.66 22 15 22 15s-1.15-2.1-3.46-3.54" />
                </svg>
                <svg
                  class="pw-icon pw-icon--on"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <div
              id="reg-password-hint"
              class="password-hint"
              role="tooltip"
              aria-hidden="true"
              hidden
            >
              <ul class="password-hint__list">
                <li class="password-hint__item">
                  <span
                    id="reg-hint-len-check"
                    class="password-hint__check"
                    aria-hidden="true"
                  >
                    ✓
                  </span>
                  <span>请输入 8-20 个字符</span>
                </li>
                <li class="password-hint__item">
                  <span
                    id="reg-hint-rule-check"
                    class="password-hint__check"
                    aria-hidden="true"
                  >
                    ✓
                  </span>
                  <span>
                    需要包含字母、数字以及标点符号中至少一种（除空格）
                  </span>
                </li>
              </ul>
            </div>
          </div>
          <div class="field">
            <label class="field__label" for="reg-password2">确认密码</label>
            <div class="password-input-wrap">
              <input
                id="reg-password2"
                name="password_confirm"
                type="password"
                class="field__input"
                placeholder="请输入确认密码"
                autocomplete="new-password"
              />
              <button
                type="button"
                id="reg-pw2-toggle"
                class="pw-toggle"
                aria-label="显示确认密码"
                aria-pressed="false"
              >
                <svg
                  class="pw-icon pw-icon--off"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M2 2l20 20" />
                  <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
                  <path d="M9.88 9.88A3 3 0 0 1 12 9a3 3 0 0 1 3 3" />
                  <path d="M6.16 6.16C2.75 8.76 2 12 2 12s2.73 5 10 5c1.54 0 2.9-.23 4.08-.62" />
                  <path d="M14.12 14.12A3 3 0 0 0 16 12a3 3 0 0 0-3-3c-.84 0-1.6.34-2.16.88" />
                  <path d="M19.84 17.84C21.25 16.66 22 15 22 15s-1.15-2.1-3.46-3.54" />
                </svg>
                <svg
                  class="pw-icon pw-icon--on"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-login btn-login--shadow">注册</button>
        </form>

        <p class="login-card__hint">
          已有账户？<a href="index.html" class="link-primary">立即登录</a>
        </p>
        <a href="index.html" class="login-card__back">← 返回首页</a>
      </div>
    </main>
    <script>
      (function () {
        const passwordInput = document.getElementById("reg-password");
        const toggleBtn = document.getElementById("reg-pw-toggle");
        const hint = document.getElementById("reg-password-hint");

        const eyeOn = toggleBtn.querySelector(".pw-icon--on");
        const eyeOff = toggleBtn.querySelector(".pw-icon--off");

        const confirmInput = document.getElementById("reg-password2");
        const confirmToggleBtn = document.getElementById("reg-pw2-toggle");
        const confirmEyeOn = confirmToggleBtn
          ? confirmToggleBtn.querySelector(".pw-icon--on")
          : null;
        const confirmEyeOff = confirmToggleBtn
          ? confirmToggleBtn.querySelector(".pw-icon--off")
          : null;

        function showHint() {
          if (!hint) return;
          hint.hidden = false;
          hint.setAttribute("aria-hidden", "false");
        }

        function hideHint() {
          if (!hint) return;
          hint.hidden = true;
          hint.setAttribute("aria-hidden", "true");
        }

        function setIcon(isShown) {
          if (eyeOn) eyeOn.style.display = isShown ? "block" : "none";
          if (eyeOff) eyeOff.style.display = isShown ? "none" : "block";
          toggleBtn.setAttribute("aria-pressed", String(isShown));
          toggleBtn.setAttribute("aria-label", isShown ? "隐藏密码" : "显示密码");
        }

        function setConfirmIcon(isShown) {
          if (confirmEyeOn)
            confirmEyeOn.style.display = isShown ? "block" : "none";
          if (confirmEyeOff)
            confirmEyeOff.style.display = isShown ? "none" : "block";
          confirmToggleBtn.setAttribute("aria-pressed", String(isShown));
          confirmToggleBtn.setAttribute(
            "aria-label",
            isShown ? "隐藏确认密码" : "显示确认密码"
          );
        }

        let hideTimer = null;
        function scheduleHide() {
          if (!hint) return;
          clearTimeout(hideTimer);
          hideTimer = setTimeout(() => {
            if (document.activeElement === toggleBtn) return;
            hideHint();
          }, 120);
        }

        passwordInput.addEventListener("focus", showHint);
        passwordInput.addEventListener("click", showHint);
        passwordInput.addEventListener("blur", scheduleHide);

        toggleBtn.addEventListener("pointerdown", (e) => {
          e.preventDefault(); // 避免影响 input blur/hint 状态
        });

        toggleBtn.addEventListener("click", () => {
          const isText = passwordInput.type === "text";
          passwordInput.type = isText ? "password" : "text";
          setIcon(!isText);
          showHint();
        });

        // 初始化：默认隐藏密码
        setIcon(false);

        const lenCheck = document.getElementById("reg-hint-len-check");
        const ruleCheck = document.getElementById("reg-hint-rule-check");

        function setCheck(el, pass) {
          if (!el) return;
          el.classList.toggle("password-hint__check--pass", !!pass);
        }

        function updateChecks() {
          const v = passwordInput.value || "";
          const lenPass = v.length >= 8 && v.length <= 20;
          const noSpacePass = !/\s/.test(v);
          const hasLetter = /[A-Za-z]/.test(v);
          const hasDigit = /\d/.test(v);
          const asciiPunct = /[!-/:-@[-`{-~]/.test(v);
          const zhPunct = /[，。、；：“”‘’（）【】《》！？…—]/.test(v);
          const hasPunct = asciiPunct || zhPunct;
          const rulePass = noSpacePass && (hasLetter || hasDigit || hasPunct);

          setCheck(lenCheck, lenPass);
          setCheck(ruleCheck, rulePass);
        }

        passwordInput.addEventListener("input", updateChecks);
        updateChecks();

        // 确认密码：查看/隐藏开关（默认关闭）
        confirmToggleBtn.addEventListener("pointerdown", (e) => {
          e.preventDefault();
        });
        confirmToggleBtn.addEventListener("click", () => {
          const isText = confirmInput.type === "text";
          confirmInput.type = isText ? "password" : "text";
          setConfirmIcon(!isText);
        });
        setConfirmIcon(false);
      })();
    </script>
  </body>
</html>
