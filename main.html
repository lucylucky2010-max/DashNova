<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流光 — AI漫剧创作平台</title>
    <link rel="icon" href="favicon.svg?v=20260320-1" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      :root {
        --nav-active: #3651d3;
      }

      /* ===== 顶部导航（覆盖登录页样式） ===== */
      .app-nav {
        background: var(--bg-nav);
        border-bottom: 1px solid var(--border-nav);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
      }

      .app-nav__inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        height: 56px;
        gap: 0;
      }

      .app-nav__brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        line-height: 1;
        margin-right: 40px;
        flex-shrink: 0;
      }

      .app-nav__brand:hover {
        opacity: 0.92;
      }

      .app-nav__brand-icon {
        display: block;
        width: 36px;
        height: 36px;
      }

      .app-nav__brand-text {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--brand-wordmark);
      }

      /* 导航链接组 */
      .app-nav__links {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1;
        min-width: 0;
      }

      .app-nav__link {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-muted);
        text-decoration: none;
        border-radius: 8px;
        transition: color 0.15s ease, background 0.15s ease;
        white-space: nowrap;
      }

      .app-nav__link:hover {
        color: var(--text-title);
        background: rgba(0, 0, 0, 0.04);
      }

      .app-nav__link--active {
        color: var(--nav-active);
        background: rgba(54, 81, 211, 0.08);
      }

      .app-nav__link--active:hover {
        color: var(--nav-active);
        background: rgba(54, 81, 211, 0.1);
      }

      .app-nav__link-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      /* 右侧用户区 */
      .app-nav__user {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-left: auto;
        flex-shrink: 0;
      }

      .btn-logout {
        display: inline-flex;
        align-items: center;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        background: transparent;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        transition: color 0.15s ease, border-color 0.15s ease;
      }

      .btn-logout:hover {
        color: var(--text-title);
        border-color: #d1d5db;
      }

      /* ===== 页面内容区 ===== */
      .main-hero {
        text-align: center;
        max-width: 680px;
        margin: 0 auto;
      }

      .main-hero__greeting {
        font-size: 32px;
        font-weight: 700;
        color: var(--text-title);
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }

      .main-hero__desc {
        font-size: 16px;
        color: var(--text-muted);
        margin: 0 0 40px;
        line-height: 1.6;
      }

      .main-actions {
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .main-card {
        background: var(--card-bg);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-card);
        padding: 32px 28px;
        width: 200px;
        text-align: center;
        text-decoration: none;
        color: var(--text-title);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .main-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 32px 64px -16px rgba(0, 0, 0, 0.12),
          0 16px 32px -10px rgba(0, 0, 0, 0.08);
      }

      .main-card__icon {
        font-size: 36px;
        margin-bottom: 14px;
        display: block;
      }

      .main-card__label {
        font-size: 15px;
        font-weight: 600;
      }

      @media (max-width: 640px) {
        .app-nav__inner {
          padding: 0 16px;
          gap: 0;
        }

        .app-nav__brand {
          margin-right: 16px;
        }

        .app-nav__brand-text {
          display: none;
        }

        .app-nav__link {
          padding: 8px 10px;
          font-size: 13px;
          gap: 4px;
        }

        .app-nav__link-icon {
          display: none;
        }

        .main-hero__greeting {
          font-size: 24px;
        }

        .main-card {
          width: 160px;
          padding: 24px 18px;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-nav">
      <div class="app-nav__inner">
        <a href="main.html" class="app-nav__brand" aria-label="DashNova 首页">
          <img
            class="app-nav__brand-icon"
            src="logo.svg"
            width="36"
            height="36"
            alt="DashNova"
          />
          <span class="app-nav__brand-text">DashNova</span>
        </a>

        <nav class="app-nav__links" aria-label="主导航">
          <a href="main.html" class="app-nav__link app-nav__link--active" data-page="home">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            首页
          </a>
          <a href="#projects" class="app-nav__link" data-page="projects">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            项目管理
          </a>
          <a href="#assets" class="app-nav__link" data-page="assets">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><path d="M3 20l5.5-7.5L12 17l3.5-4.5L21 20"/><rect x="2" y="2" width="20" height="20" rx="2.18"/></svg>
            素材库
          </a>
          <a href="#settings" class="app-nav__link" data-page="settings">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1.08 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1.08H21a2 2 0 0 1 0 4h-.09c-.658.08-1.25.476-1.51 1.08Z"/></svg>
            设置
          </a>
        </nav>

        <div class="app-nav__user">
          <a href="index.html" class="btn-logout">退出登录</a>
        </div>
      </div>
    </header>

    <main class="page-main">
      <div class="main-hero">
        <h1 class="main-hero__greeting">欢迎回来</h1>
        <p class="main-hero__desc">
          选择一个功能，开始你的 AI 漫剧创作之旅
        </p>
        <div class="main-actions">
          <a href="#" class="main-card">
            <span class="main-card__icon">✨</span>
            <span class="main-card__label">新建项目</span>
          </a>
          <a href="#" class="main-card">
            <span class="main-card__icon">📂</span>
            <span class="main-card__label">我的作品</span>
          </a>
          <a href="#" class="main-card">
            <span class="main-card__icon">🎨</span>
            <span class="main-card__label">素材库</span>
          </a>
        </div>
      </div>
    </main>

    <script>
      (function () {
        const links = document.querySelectorAll(".app-nav__link");
        links.forEach(function (link) {
          link.addEventListener("click", function (e) {
            links.forEach(function (l) {
              l.classList.remove("app-nav__link--active");
            });
            this.classList.add("app-nav__link--active");
          });
        });
      })();
    </script>
  </body>
</html>
