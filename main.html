<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流光 — AI漫剧创作平台</title>
    <link rel="icon" href="favicon.svg?v=20260320-1" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="app-nav.css" />
    <style>
      body {
        background: linear-gradient(168deg, #f0f4ff 0%, #f9fafb 40%, #f4f0ff 100%);
      }

      .hero {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        min-height: calc(100vh - 56px - 80px);
        gap: 48px;
      }

      /* 左侧文案 */
      .hero__text {
        flex: 1;
        min-width: 0;
      }

      .hero__title {
        font-size: 40px;
        font-weight: 800;
        line-height: 1.25;
        letter-spacing: -0.02em;
        color: var(--text-title);
        margin: 0 0 16px;
      }

      .hero__title em {
        font-style: normal;
        background: linear-gradient(135deg, #3651d3 0%, #7c5ce7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero__desc {
        font-size: 17px;
        line-height: 1.7;
        color: var(--text-muted);
        margin: 0 0 32px;
        max-width: 420px;
      }

      .hero__cta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 36px;
        font-size: 16px;
        font-weight: 600;
        font-family: inherit;
        color: #fff;
        background: linear-gradient(135deg, #3651d3 0%, #5b6fe6 100%);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 8px 24px -4px rgba(54, 81, 211, 0.35);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .hero__cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px -4px rgba(54, 81, 211, 0.45);
      }

      .hero__cta:active {
        transform: translateY(0);
      }

      .hero__cta-icon {
        width: 20px;
        height: 20px;
      }

      /* 右侧视觉区 */
      .hero__visual {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .showcase {
        position: relative;
        width: 100%;
        max-width: 480px;
        aspect-ratio: 4 / 3;
        background: linear-gradient(145deg, rgba(255,255,255,0.9) 0%, rgba(240,244,255,0.7) 100%);
        border-radius: 20px;
        border: 1px solid rgba(54, 81, 211, 0.08);
        box-shadow:
          0 32px 64px -16px rgba(54, 81, 211, 0.12),
          0 0 0 1px rgba(255,255,255,0.8) inset;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .showcase__bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        background: rgba(255,255,255,0.6);
        border-bottom: 1px solid rgba(0,0,0,0.04);
      }

      .showcase__dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .showcase__dot--r { background: #ff6b6b; }
      .showcase__dot--y { background: #feca57; }
      .showcase__dot--g { background: #48dbfb; }

      .showcase__body {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 16px;
      }

      .showcase__panel {
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px;
      }

      .showcase__panel--script {
        background: linear-gradient(135deg, #eef2ff 0%, #e8ecff 100%);
        grid-row: 1 / 3;
      }

      .showcase__panel--chars {
        background: linear-gradient(135deg, #fef3f2 0%, #fde8e8 100%);
      }

      .showcase__panel--video {
        background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
      }

      .showcase__panel-icon {
        width: 28px;
        height: 28px;
        opacity: 0.6;
      }

      .showcase__panel-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-align: center;
      }

      /* 装饰浮动元素 */
      .float-badge {
        position: absolute;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 8px 24px -6px rgba(0,0,0,0.1);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-title);
        animation: float 3s ease-in-out infinite;
      }

      .float-badge--top {
        top: -16px;
        right: -10px;
        animation-delay: 0s;
      }

      .float-badge--bottom {
        bottom: -12px;
        left: -10px;
        animation-delay: 1.5s;
      }

      .float-badge__dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      /* 底部特性条 */
      .features {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px 40px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .feature-card {
        background: rgba(255,255,255,0.7);
        border: 1px solid rgba(0,0,0,0.05);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        backdrop-filter: blur(8px);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .feature-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px -8px rgba(54, 81, 211, 0.1);
      }

      .feature-card__icon {
        width: 32px;
        height: 32px;
        margin: 0 auto 12px;
        color: #3651d3;
      }

      .feature-card__title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-title);
        margin: 0 0 6px;
      }

      .feature-card__desc {
        font-size: 13px;
        color: var(--text-muted);
        margin: 0;
        line-height: 1.5;
      }

      @media (max-width: 900px) {
        .hero {
          flex-direction: column;
          text-align: center;
          padding-top: 32px;
          gap: 32px;
          min-height: auto;
        }

        .hero__desc {
          max-width: 100%;
        }

        .hero__visual {
          width: 100%;
        }

        .showcase {
          max-width: 380px;
        }

        .features {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .hero__title {
          font-size: 28px;
        }

        .hero__desc {
          font-size: 15px;
        }

        .showcase {
          max-width: 300px;
        }

        .float-badge {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-nav">
      <div class="app-nav__inner">
        <a href="main.html" class="app-nav__brand" aria-label="DashNova 首页">

        <nav class="app-nav__links" aria-label="主导航">

            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><path d="M3 20l5.5-7.5L12 17l3.5-4.5L21 20"/><rect x="2" y="2" width="20" height="20" rx="2.18"/></svg>
            资产库

          <a href="settings.html" class="app-nav__link" data-page="settings">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1.08 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1.08H21a2 2 0 0 1 0 4h-.09c-.658.08-1.25.476-1.51 1.08Z"/></svg>

          </a>
        </nav>

        <div class="app-nav__user" id="user-menu">
          <button class="user-trigger" id="user-trigger" aria-haspopup="true" aria-expanded="false">
            <span class="user-avatar">A</span>
            <span class="user-trigger__name">Admin</span>
            <svg class="user-trigger__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="user-dropdown" role="menu">
            <div class="user-dropdown__header">Admin</div>
            <a href="#" class="user-dropdown__item" role="menuitem">
              <svg class="user-dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              账户分配
            </a>
            <a href="#" class="user-dropdown__item" role="menuitem">
              <svg class="user-dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>

            <a href="index.html" class="user-dropdown__item user-dropdown__item--danger" role="menuitem">
              <svg class="user-dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              退出登录
            </a>
          </div>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="hero__text">
        <h1 class="hero__title"><em>AI 漫剧</em>生成与<br/>智能编排平台</h1>
        <p class="hero__desc">输入脚本，一键生成分镜、画面、配音与视频短片。从文字到动漫，全流程 AI 驱动。</p>
        <a href="workspace.html" class="hero__cta">
          <svg class="hero__cta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          立即新建项目
        </a>
      </div>

      <div class="hero__visual">
        <div class="showcase">
          <div class="showcase__bar">
            <span class="showcase__dot showcase__dot--r"></span>
            <span class="showcase__dot showcase__dot--y"></span>
            <span class="showcase__dot showcase__dot--g"></span>
          </div>
          <div class="showcase__body">
            <div class="showcase__panel showcase__panel--script">
              <svg class="showcase__panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              <span class="showcase__panel-label">脚本解析</span>
              <svg class="showcase__panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              <span class="showcase__panel-label">智能分镜</span>
            </div>
            <div class="showcase__panel showcase__panel--chars">
              <svg class="showcase__panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

            </div>
            <div class="showcase__panel showcase__panel--video">
              <svg class="showcase__panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
              <span class="showcase__panel-label">配音 &amp; 视频合成</span>
            </div>
          </div>
        </div>
        <div class="float-badge float-badge--top">
          <span class="float-badge__dot" style="background:#22c55e;"></span>
          AI 模型就绪
        </div>
        <div class="float-badge float-badge--bottom">
          <span class="float-badge__dot" style="background:#3651d3;"></span>
          一键生成短片
        </div>
      </div>
    </section>

    <div class="features">
      <div class="feature-card">
        <svg class="feature-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p class="feature-card__title">脚本驱动创作</p>
        <p class="feature-card__desc">文本拆分，自动分镜</p>
      </div>
      <div class="feature-card">
        <svg class="feature-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18"/><circle cx="13.5" cy="6.5" r="2.5"/><path d="M3 20l5.5-7.5L12 17l3.5-4.5L21 20"/></svg>
        <p class="feature-card__title">智能生成分镜</p>
        <p class="feature-card__desc">生成画面、字幕、配音</p>
      </div>
      <div class="feature-card">
        <svg class="feature-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <p class="feature-card__title">多场景应用</p>
        <p class="feature-card__desc">适用短剧动画等</p>
      </div>
    </div>

    <script>
      (function () {
        var menu = document.getElementById("user-menu");
        var trigger = document.getElementById("user-trigger");
        trigger.addEventListener("click", function (e) {
          e.stopPropagation();
          var open = menu.classList.toggle("open");
          trigger.setAttribute("aria-expanded", String(open));
        });
        document.addEventListener("click", function () {
          menu.classList.remove("open");
          trigger.setAttribute("aria-expanded", "false");
        });
      })();
    </script>
  </body>
