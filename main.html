<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流光 — AI漫剧创作平台</title>
    <link rel="icon" href="favicon.svg?v=20260320-1" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="app-nav.css" />
    <style>
      html { height: 100%; }
      body {
        height: 100%;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: linear-gradient(168deg, #eaefff 0%, #f1f3fb 32%, #ede9ff 62%, #f5f6ff 100%);
        position: relative;
      }

      .app-nav { flex-shrink: 0; position: relative; z-index: 10; }

      /* ── 页面主体 ── */
      .page-body {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 1;
      }

      /* ── Hero ── */
      .hero {
        max-width: 1280px;
        width: 100%;
        margin: 0 auto;
        padding: 0 80px;
        display: flex;
        align-items: center;
        flex: 1;
        min-height: 0;
        gap: 56px;
        box-sizing: border-box;
      }

      .hero__text {
        flex: 0 0 380px;
        position: relative;
        z-index: 2;
      }

      .hero__title {
        font-size: 36px;
        font-weight: 800;
        line-height: 1.28;
        white-space: nowrap;
        letter-spacing: -0.02em;
        color: var(--text-title);
        margin: 0 0 16px;
      }

      .hero__title em {
        font-style: normal;
        background: linear-gradient(135deg, #3651d3, #7c5ce7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero__desc {
        font-size: 16px;
        line-height: 1.7;
        color: #6b7280;
        margin: 0 0 28px;
      }

      .hero__cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 32px;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        color: #fff;
        background: linear-gradient(135deg, #3651d3, #5b6fe6);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 8px 24px -4px rgba(54,81,211,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .hero__cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 36px -6px rgba(54,81,211,0.45);
      }

      .hero__cta:active { transform: translateY(0); }

      /* ── 右侧视觉区 ── */
      .hero__visual {
        flex: 1;
        min-width: 0;
        position: relative;
        height: clamp(340px, 58vh, 500px);
      }

      /* 背景装饰窗口 */
      .bg-panel {
        position: absolute;
        border-radius: 16px;
        background: rgba(255,255,255,0.55);
        border: 1px solid rgba(255,255,255,0.6);
        box-shadow: 0 8px 32px -8px rgba(54,81,211,0.06);
        backdrop-filter: blur(6px);
      }

      .bg-panel--left {
        left: -20px;
        top: 16px;
        width: 160px;
        height: 260px;
        z-index: 0;
        opacity: 0.5;
      }

      .bg-panel--right {
        right: -8px;
        top: -10px;
        width: 220px;
        height: 140px;
        z-index: 0;
        opacity: 0.45;
      }

      .bg-panel__bar {
        display: flex;
        gap: 4px;
        padding: 10px 14px;
        border-bottom: 1px solid rgba(0,0,0,0.04);
      }

      .bg-panel__dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(0,0,0,0.08);
      }

      .bg-panel__line {
        margin: 10px 14px;
        height: 5px;
        border-radius: 3px;
        background: rgba(0,0,0,0.04);
      }

      .bg-panel__line--short { width: 60%; }
      .bg-panel__line--mid { width: 80%; }

      .bg-panel--right .bg-panel__title {
        padding: 10px 14px 6px;
        font-size: 10px;
        font-weight: 700;
        color: rgba(0,0,0,0.12);
      }

      /* 主图片面板 */
      .image-panel {
        position: absolute;
        left: 56px;
        top: 28px;
        right: 40px;
        bottom: 60px;
        background: #fff;
        border-radius: 20px;
        box-shadow:
          0 24px 56px -12px rgba(54,81,211,0.16),
          0 0 0 1px rgba(0,0,0,0.03);
        overflow: hidden;
        z-index: 1;
        display: flex;
        flex-direction: column;
      }

      .image-panel__bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        background: #fafbfd;
        border-bottom: 1px solid rgba(0,0,0,0.05);
        flex-shrink: 0;
      }

      .image-panel__dot { width: 8px; height: 8px; border-radius: 50%; }
      .image-panel__dot--r { background: #ff6b6b; }
      .image-panel__dot--y { background: #feca57; }
      .image-panel__dot--g { background: #48dbfb; }

      .image-panel__label {
        margin-left: 10px;
        font-size: 11px;
        color: #94a3b8;
        font-weight: 600;
      }

      .image-panel__grid {
        flex: 1;
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 8px;
        padding: 10px;
        min-height: 0;
      }

      .image-panel__img {
        border-radius: 16px;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .image-panel__img--main {
        grid-row: 1 / 3;
      }

      /* 视频预览卡 */
      .video-card {
        position: absolute;
        right: 0;
        bottom: 10px;
        width: 140px;
        height: 100px;
        background: linear-gradient(145deg, #1e293b, #334155);
        border-radius: 16px;
        box-shadow: 0 12px 32px -6px rgba(0,0,0,0.28);
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        overflow: hidden;
      }

      .video-card__play {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255,255,255,0.12);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .video-card__play svg {
        width: 16px;
        height: 16px;
        color: #fff;
        margin-left: 2px;
      }

      .video-card__bars {
        display: flex;
        align-items: center;
        gap: 3px;
        padding: 0 16px;
        width: 100%;
        box-sizing: border-box;
      }

      .video-card__track {
        flex: 1;
        height: 3px;
        border-radius: 2px;
        background: rgba(255,255,255,0.12);
        position: relative;
        overflow: hidden;
      }

      .video-card__track::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 35%;
        background: #60a5fa;
        border-radius: 2px;
      }

      .video-card__time {
        font-size: 9px;
        color: rgba(255,255,255,0.5);
        flex-shrink: 0;
      }

      /* ── 功能卡片 ── */
      .features {
        max-width: 1280px;
        width: 100%;
        margin: -10px auto 0;
        padding: 0 80px 24px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        flex-shrink: 0;
        box-sizing: border-box;
      }

      .feature-card {
        background: rgba(255,255,255,0.72);
        border: 1px solid rgba(0,0,0,0.05);
        border-radius: 14px;
        padding: 20px 24px;
        text-align: center;
        backdrop-filter: blur(8px);
        transition: transform 0.15s, box-shadow 0.15s;
      }

      .feature-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px -8px rgba(54,81,211,0.1);
      }

      .feature-card__icon { width: 26px; height: 26px; margin: 0 auto 8px; color: #3651d3; }

      .feature-card__title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-title);
        margin: 0 0 3px;
      }

      .feature-card__desc {
        font-size: 12px;
        color: var(--text-muted);
        margin: 0;
        line-height: 1.5;
      }

      @media (max-width: 1100px) {
        .hero { padding: 0 40px; gap: 32px; }
        .hero__text { flex: 0 0 320px; }
        .hero__title { font-size: 30px; }
        .features { padding: 0 40px 20px; }
      }

      @media (max-width: 900px) {
        .hero { flex-direction: column; text-align: center; gap: 24px; padding: 24px 24px 0; }
        .hero__text { flex: none; width: 100%; }
        .hero__visual { width: 100%; height: 280px; }
        .bg-panel { display: none; }
        .features { grid-template-columns: 1fr; padding: 0 24px 16px; }
      }
    </style>
  </head>
  <body>
    <header class="app-nav">
      <div class="app-nav__inner">
        <a href="main.html" class="app-nav__brand" aria-label="DashNova 首页">
          <img class="app-nav__brand-icon" src="logo.svg" width="36" height="36" alt="DashNova" />
          <span class="app-nav__brand-text">DashNova</span>
        </a>

        <nav class="app-nav__links" aria-label="主导航">
          <a href="main.html" class="app-nav__link app-nav__link--active" data-page="home">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            首页
          </a>
          <a href="workspace.html" class="app-nav__link" data-page="projects">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            工作台
          </a>
          <a href="asset-hub.html" class="app-nav__link" data-page="assets">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><path d="M3 20l5.5-7.5L12 17l3.5-4.5L21 20"/><rect x="2" y="2" width="20" height="20" rx="2.18"/></svg>
            资产库
          </a>
          <a href="settings.html" class="app-nav__link" data-page="settings">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1.08 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1.08H21a2 2 0 0 1 0 4h-.09c-.658.08-1.25.476-1.51 1.08Z"/></svg>
            设置
          </a>
        </nav>

        <div class="app-nav__user" id="user-menu">
          <button class="user-trigger" id="user-trigger" aria-haspopup="true" aria-expanded="false">
            <span class="user-avatar">A</span>
            <span class="user-trigger__name">Admin</span>
            <svg class="user-trigger__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="user-dropdown" role="menu">
            <div class="user-dropdown__header">Admin</div>
            <a href="#" class="user-dropdown__item" role="menuitem">
              <svg class="user-dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              账户分配
            </a>
            <a href="#" class="user-dropdown__item" role="menuitem">
              <svg class="user-dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              修改密码
            </a>
            <div class="user-dropdown__divider"></div>
            <a href="index.html" class="user-dropdown__item user-dropdown__item--danger" role="menuitem">
              <svg class="user-dropdown__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              退出登录
            </a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-body">
      <section class="hero">
        <!-- Hero 左侧文案 -->
        <div class="hero__text">
          <h1 class="hero__title"><em>AI漫剧</em>生成与智能编排平台</h1>
          <p class="hero__desc">输入脚本，一键生成分镜、画面、配音与视频片段</p>
          <a href="workspace.html" class="hero__cta">立即开始创作</a>
        </div>

        <!-- Hero 右侧视觉区 -->
        <div class="hero__visual">
          <!-- 背景装饰窗口 -->
          <div class="bg-panel bg-panel--left" aria-hidden="true">
            <div class="bg-panel__bar"><span class="bg-panel__dot"></span><span class="bg-panel__dot"></span><span class="bg-panel__dot"></span></div>
            <div class="bg-panel__line"></div>
            <div class="bg-panel__line bg-panel__line--short"></div>
            <div class="bg-panel__line bg-panel__line--mid"></div>
            <div class="bg-panel__line"></div>
            <div class="bg-panel__line bg-panel__line--short"></div>
          </div>
          <div class="bg-panel bg-panel--right" aria-hidden="true">
            <div class="bg-panel__bar"><span class="bg-panel__dot"></span><span class="bg-panel__dot"></span><span class="bg-panel__dot"></span></div>
            <div class="bg-panel__title">场景对话…</div>
            <div class="bg-panel__line bg-panel__line--mid"></div>
            <div class="bg-panel__line bg-panel__line--short"></div>
          </div>

          <!-- 图片面板（ImagePanel） -->
          <div class="image-panel">
            <div class="image-panel__bar">
              <span class="image-panel__dot image-panel__dot--r"></span>
              <span class="image-panel__dot image-panel__dot--y"></span>
              <span class="image-panel__dot image-panel__dot--g"></span>
              <span class="image-panel__label">3组 场景成果</span>
            </div>
            <div class="image-panel__grid">
              <img class="image-panel__img image-panel__img--main" src="pic1.png" alt="教室场景 — 女生写作业" />
              <img class="image-panel__img" src="pic2.png" alt="AI对话 — 女生与机器人" />
              <img class="image-panel__img" src="pic3.png" alt="校园场景 — 男女对话" />
            </div>
          </div>

          <!-- 视频预览卡（VideoPreview） -->
          <div class="video-card" aria-hidden="true">
            <div class="video-card__play">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
            </div>
            <div class="video-card__bars">
              <span class="video-card__time">0:12</span>
              <div class="video-card__track"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 功能卡片（FeatureCards） -->
      <div class="features">
        <div class="feature-card">
          <svg class="feature-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <p class="feature-card__title">脚本驱动创作</p>
          <p class="feature-card__desc">文本拆分，自动分镜</p>
        </div>
        <div class="feature-card">
          <svg class="feature-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18"/><circle cx="13.5" cy="6.5" r="2.5"/><path d="M3 20l5.5-7.5L12 17l3.5-4.5L21 20"/></svg>
          <p class="feature-card__title">智能生成分镜</p>
          <p class="feature-card__desc">生成画面、字幕、配音</p>
        </div>
        <div class="feature-card">
          <svg class="feature-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          <p class="feature-card__title">多场景应用</p>
          <p class="feature-card__desc">适用短剧动画等</p>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var menu = document.getElementById("user-menu");
        var trigger = document.getElementById("user-trigger");
        trigger.addEventListener("click", function (e) {
          e.stopPropagation();
          var open = menu.classList.toggle("open");
          trigger.setAttribute("aria-expanded", String(open));
        });
        document.addEventListener("click", function () {
          menu.classList.remove("open");
          trigger.setAttribute("aria-expanded", "false");
        });
      })();
    </script>
  </body>
</html>
