<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流光 — AI漫剧创作平台</title>
    <link rel="icon" href="favicon.svg?v=20260320-1" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="app-nav.css" />
    <style>
      html { height: 100%; }
      body {
        height: 100%;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: linear-gradient(168deg, #eaefff 0%, #f1f3fb 32%, #ede9ff 62%, #f5f6ff 100%);
        position: relative;
      }

      /* ── 背景：弧形流线光带 ── */
      .bg-trails {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      /* ── 背景：星点（低密度 + 淡蓝辉光） ── */
      .bg-stars {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .bg-star {
        position: absolute;
        color: rgba(255,255,255,0.95);
        filter: drop-shadow(0 0 4px rgba(100,150,255,0.55)) drop-shadow(0 0 10px rgba(120,160,255,0.25));
      }

      .bg-star svg {
        display: block;
        width: 7px;
        height: 7px;
      }

      .app-nav { flex-shrink: 0; position: relative; z-index: 10; }

      /* ── 页面主体 ── */
      .page-body {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 1;
      }

      /* ── Hero ── */
      .hero {
        max-width: 1280px;
        width: 100%;
        margin: 0 auto;
        padding: 0 80px;
        display: flex;
        align-items: center;
        flex: 1;
        min-height: 0;
        gap: 56px;
        box-sizing: border-box;
      }

      .hero__text {
        flex: 0 0 380px;
        position: relative;
        z-index: 2;
      }

      .hero__title {
        font-size: 36px;
        font-weight: 800;
        line-height: 1.28;
        white-space: nowrap;
        letter-spacing: -0.02em;
        color: var(--text-title);
        margin: 0 0 16px;
      }

      .hero__title em {
        font-style: normal;
        background: linear-gradient(135deg, #3651d3, #7c5ce7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero__desc {
        font-size: 16px;
        line-height: 1.7;
        color: #6b7280;
        margin: 0 0 28px;
      }

      .hero__cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 32px;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        color: #fff;
        background: linear-gradient(135deg, #3651d3, #5b6fe6);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 8px 24px -4px rgba(54,81,211,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .hero__cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 36px -6px rgba(54,81,211,0.45);
      }

      .hero__cta:active { transform: translateY(0); }

      /* ── 右侧视觉区 ── */
      .hero__visual {
        flex: 1;
        min-width: 0;
        position: relative;
        height: clamp(340px, 58vh, 500px);
      }

      /* ── 左侧背景面板（Scene Planner） ── */
      .bg-panel {
        position: absolute;
        border-radius: 16px;
        overflow: hidden;
      }

      .bg-panel--left {
        left: -30px;
        top: 16px;
        width: 260px;
        height: 340px;
        z-index: -1;
        transform: rotate(-4deg);
        background: rgba(255,255,255,0.5);
        border: 1px solid rgba(255,255,255,0.6);
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        backdrop-filter: blur(6px);
        opacity: 0.8;
        padding: 14px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .bg-panel--left .bp-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(229,231,235,0.5);
      }

      .bp-dots { display: flex; gap: 5px; }
      .bp-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(209,213,219,0.8); }

      .bp-topbar-label {
        font-size: 8.5px;
        font-weight: 500;
        color: #9ca3af;
        letter-spacing: 0.5px;
      }

      .bp-highlight {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 5px 9px;
        background: rgba(232,240,254,0.8);
        border-radius: 6px;
      }

      .bp-highlight svg { width: 12px; height: 12px; color: #246bf2; flex-shrink: 0; }

      .bp-highlight-text {
        font-size: 10.5px;
        font-weight: 600;
        color: #246bf2;
      }

      .bp-script-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex: 1;
      }

      .bp-script-row {
        display: flex;
        align-items: flex-start;
        gap: 7px;
      }

      .bp-script-num {
        font-size: 9px;
        color: #9ca3af;
        font-weight: 500;
        flex-shrink: 0;
        padding-top: 2px;
      }

      .bp-script-lines {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .bp-script-row--active .bp-script-lines {
        padding: 7px;
        background: rgba(255,255,255,0.6);
        border: 1px solid rgba(255,255,255,0.5);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      }

      .bp-bar {
        height: 6px;
        border-radius: 9999px;
        background: rgba(229,231,235,0.8);
      }

      .bp-bar--light { background: rgba(229,231,235,0.6); }
      .bp-bar--faint { background: #f3f4f6; }

      /* ── 右侧背景面板（场景对话） ── */
      .bg-panel--right {
        right: -10px;
        top: -18px;
        width: 320px;
        height: 235px;
        z-index: 0;
        transform: rotate(3deg);
        background: rgba(255,255,255,0.8);
        border: 1px solid rgba(255,255,255,0.8);
        border-radius: 16px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.03);
        backdrop-filter: blur(12px);
        padding: 0;
        box-sizing: border-box;
      }

      .bg-panel--right .rp-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid #f3f4f6;
      }

      .rp-dots { display: flex; gap: 5px; }
      .rp-dot { width: 10px; height: 10px; border-radius: 50%; }
      .rp-dot--r { background: #ff5f56; }
      .rp-dot--y { background: #ffbd2e; }
      .rp-dot--g { background: #27c93f; }

      .rp-nav { display: flex; gap: 6px; }
      .rp-nav-btn {
        width: 14px; height: 14px; border-radius: 2px;
        background: #f3f4f6;
        display: flex; align-items: center; justify-content: center;
        font-size: 8px; color: #9ca3af;
      }

      .rp-title {
        font-size: 13px;
        font-weight: 700;
        color: #1c2a4f;
        padding: 16px 16px 0;
      }

      .rp-body { padding: 12px 16px 16px; padding-left: 24px; display: flex; flex-direction: column; gap: 14px; }

      .rp-row {
        display: flex;
        align-items: flex-start;
        gap: 7px;
      }

      .rp-num {
        font-size: 10px;
        color: #9ca3af;
        flex-shrink: 0;
        padding-top: 2px;
      }

      .rp-lines {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .rp-bar {
        height: 12px;
        border-radius: 4px;
        background: #f3f4f6;
      }

      /* ── 主图片面板：外层固定阴影不随 transform 变形，内层浮动+圆角裁切，减轻插图区方块阴影 ── */
      .image-panel {
        position: absolute;
        left: 56px;
        top: 28px;
        right: 40px;
        bottom: 60px;
        border-radius: 20px;
        z-index: 1;
        overflow: visible;
        box-shadow: 0 8px 24px rgba(28,42,79,0.06);
      }

      .image-panel__motion {
        width: 100%;
        height: 100%;
        border-radius: 20px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: rgba(255,255,255,0.95);
        border: 1px solid #fff;
        backdrop-filter: blur(20px);
        transform: translateZ(0);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }

      .ip-topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        height: 44px;
        padding: 0 16px;
        background: rgba(249,250,251,0.8);
        border-bottom: 1px solid rgba(243,244,246,0.8);
        flex-shrink: 0;
      }

      .ip-dots { display: flex; gap: 6px; }
      .ip-dot { width: 12px; height: 12px; border-radius: 50%; }
      .ip-dot--r { background: #ff5f56; }
      .ip-dot--y { background: #ffbd2e; }
      .ip-dot--g { background: #27c93f; }

      .ip-nav {
        display: flex; gap: 4px; opacity: 0.5; margin-left: 8px;
      }
      .ip-nav-btn {
        width: 16px; height: 16px;
        display: flex; align-items: center; justify-content: center;
        font-size: 10px; color: #9ca3af;
      }

      .ip-address {
        flex: 1;
        max-width: 200px;
        height: 24px;
        border-radius: 6px;
        border: 1px solid #e5e7eb;
        background: #fff;
        margin: 0 auto;
        display: flex;
        align-items: center;
        padding: 0 9px;
      }

      .ip-address-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #e5e7eb;
      }

      .ip-actions {
        display: flex; gap: 8px;
      }

      .ip-action-btn {
        width: 16px; height: 16px; border-radius: 4px;
        background: #e5e7eb;
      }

      .ip-grid {
        flex: 1;
        display: grid;
        grid-template-columns: 1.22fr 1fr;
        gap: 14px;
        padding: 14px;
        min-height: 0;
      }

      .ip-img-wrap {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        background: #e5e7eb;
      }

      .ip-img-wrap--main { grid-row: 1 / 3; }

      .ip-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .ip-img-wrap--right { border-radius: 10px; }

      .ip-overlay-icon {
        position: absolute;
        left: 12px;
        bottom: 12px;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: rgba(255,255,255,0.3);
        border: 1px solid rgba(255,255,255,0.5);
        backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .ip-overlay-icon svg {
        width: 20px; height: 20px; color: #fff;
      }



      /* ── 功能卡片 ── */
      .features {
        max-width: 1280px;
        width: 100%;
        margin: -20px auto 0;
        padding: 0 80px 24px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        flex-shrink: 0;
        box-sizing: border-box;
      }

      .feature-card {
        background: rgba(255,255,255,0.6);
        border: 1px solid rgba(255,255,255,0.7);
        border-radius: 22px;
        padding: 28px;
        text-align: center;
        backdrop-filter: blur(12px);
        box-shadow:
          0 1px 2px rgba(96,130,240,0.04),
          0 4px 20px -4px rgba(96,130,240,0.07);
        transition: transform 0.3s cubic-bezier(.4,0,.2,1),
                    box-shadow 0.3s cubic-bezier(.4,0,.2,1),
                    border-color 0.3s ease;
      }

      .feature-card:hover {
        transform: translateY(-4px);
        border-color: rgba(96,130,240,0.18);
        box-shadow:
          0 2px 4px rgba(96,130,240,0.05),
          0 10px 28px -6px rgba(96,130,240,0.1);
      }

      .feature-card__icon { width: 28px; height: 28px; margin: 0 auto 10px; color: #5a7cf5; }

      .feature-card__title {
        font-size: 15px;
        font-weight: 700;
        color: #1c2a4f;
        margin: 0 0 6px;
      }

      .feature-card__desc {
        font-size: 12.5px;
        color: #9ca3af;
        margin: 0;
        line-height: 1.6;
      }

      /* ── 浮动微动画 ── */
      @keyframes floatLeft {
        0%, 100% { transform: rotate(-4deg) translate(0, 0); }
        50%      { transform: rotate(-3.4deg) translate(2px, -5px); }
      }

      @keyframes floatCenter {
        0%, 100% { transform: translateZ(0) translate(0, 0) rotate(0deg); }
        50%      { transform: translateZ(0) translate(-2px, -4px) rotate(0.2deg); }
      }

      @keyframes floatRight {
        0%, 100% { transform: rotate(3deg) translate(0, 0); }
        50%      { transform: rotate(3.5deg) translate(-2px, -5px); }
      }

      .bg-panel--left {
        animation: floatLeft 6s ease-in-out infinite;
      }

      .image-panel__motion {
        animation: floatCenter 7s ease-in-out 0.8s infinite;
      }

      .bg-panel--right {
        animation: floatRight 5.5s ease-in-out infinite;
      }

      @media (max-width: 1100px) {
        .hero { padding: 0 40px; gap: 32px; }
        .hero__text { flex: 0 0 320px; }
        .hero__title { font-size: 30px; }
        .features { padding: 0 40px 20px; }
      }

      @media (max-width: 900px) {
        .hero { flex-direction: column; text-align: center; gap: 24px; padding: 24px 24px 0; }
        .hero__text { flex: none; width: 100%; }
        .hero__visual { width: 100%; height: 280px; }
        .bg-panel { display: none; }
        .features { grid-template-columns: 1fr; padding: 0 24px 16px; }
      }

      /* 新建项目弹框（与设置页弹窗风格一致） */
      .new-project-modal {
        position: fixed;
        inset: 0;
        z-index: 3000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .new-project-modal--open {
        display: flex;
      }

      .new-project-modal__backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
      }

      .new-project-modal__dialog {
        position: relative;
        width: 100%;
        max-width: 440px;
        background: #fff;
        border-radius: 28px;
        box-shadow: 0 24px 56px -12px rgba(0, 0, 0, 0.22),
          0 12px 28px -8px rgba(0, 0, 0, 0.1);
        padding: 26px 28px 22px;
        overflow: hidden;
      }

      .new-project-modal__title {
        margin: 0 0 22px;
        font-size: 20px;
        font-weight: 700;
        color: #111827;
      }

      .new-project-modal__field {
        margin-bottom: 18px;
      }

      .new-project-modal__label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #111827;
        margin-bottom: 8px;
      }

      .new-project-modal__req {
        color: #ef4444;
        margin-left: 2px;
      }

      .new-project-modal__input,
      .new-project-modal__textarea {
        width: 100%;
        box-sizing: border-box;
        font-size: 14px;
        font-family: inherit;
        color: #111827;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 11px 14px;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .new-project-modal__textarea {
        min-height: 108px;
        resize: vertical;
        line-height: 1.5;
      }

      .new-project-modal__input:focus,
      .new-project-modal__textarea:focus {
        border-color: #3651d3;
        box-shadow: 0 0 0 3px rgba(54, 81, 211, 0.18);
      }

      .new-project-modal__input::placeholder,
      .new-project-modal__textarea::placeholder {
        color: #9ca3af;
      }

      .new-project-modal__footer {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 12px;
        margin-top: 26px;
      }

      .new-project-modal__btn {
        min-width: 96px;
        padding: 10px 22px;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      }

      .new-project-modal__btn--secondary {
        color: #111827;
        background: #fff;
        border: 1px solid #e5e7eb;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }

      .new-project-modal__btn--secondary:hover {
        background: #f9fafb;
        border-color: #d1d5db;
      }

      .new-project-modal__btn--primary {
        color: #fff;
        background: linear-gradient(90deg, #3651d3 0%, #6b95f0 100%);
        border: none;
        box-shadow: 0 4px 14px -2px rgba(54, 81, 211, 0.45);
      }

      .new-project-modal__btn--primary:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <div class="bg-trails" aria-hidden="true">
      <svg viewBox="0 0 1440 900" preserveAspectRatio="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="trail-a" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="38%" stop-color="rgba(130,165,255,0.14)"/>
            <stop offset="62%" stop-color="rgba(160,190,255,0.1)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <linearGradient id="trail-b" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="42%" stop-color="rgba(100,150,240,0.11)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <linearGradient id="trail-c" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="48%" stop-color="rgba(140,160,255,0.09)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
        </defs>
        <path d="M-80 720 Q 420 360, 880 400 T 1520 180" fill="none" stroke="url(#trail-a)" stroke-width="1.5"/>
        <path d="M-40 820 Q 380 480, 800 520 T 1540 320" fill="none" stroke="url(#trail-b)" stroke-width="1"/>
        <path d="M180 0 Q 520 260, 1020 220 T 1520 500" fill="none" stroke="url(#trail-c)" stroke-width="1.2"/>
      </svg>
    </div>
    <div class="bg-stars" aria-hidden="true">
      <span class="bg-star" style="left:14%;top:22%">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.2 6.8h7l-5.7 4.1 2.2 6.8L12 15.6 6.3 19.7l2.2-6.8L2.8 8.8h7L12 2z"/></svg>
      </span>
      <span class="bg-star" style="left:72%;top:16%">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.2 6.8h7l-5.7 4.1 2.2 6.8L12 15.6 6.3 19.7l2.2-6.8L2.8 8.8h7L12 2z"/></svg>
      </span>
      <span class="bg-star" style="left:48%;top:78%">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.2 6.8h7l-5.7 4.1 2.2 6.8L12 15.6 6.3 19.7l2.2-6.8L2.8 8.8h7L12 2z"/></svg>
      </span>
    </div>

    <header class="app-nav">
      <div class="app-nav__inner">
        <a href="main.html" class="app-nav__brand" aria-label="DashNova 首页">
          <img class="app-nav__brand-icon" src="logo.svg" width="36" height="36" alt="DashNova" />
          <span class="app-nav__brand-text">DashNova</span>
        </a>

        <nav class="app-nav__links" aria-label="主导航">
          <a href="main.html" class="app-nav__link app-nav__link--active" data-page="home">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            首页
          </a>
          <a href="workspace.html" class="app-nav__link" data-page="projects">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            工作台
          </a>
          <a href="asset-hub.html" class="app-nav__link" data-page="assets">
            <svg class="app-nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><path d="M3 20l5.5-7.5L12 17l3.5-4.5L21 20"/><rect x="2" y="2" width="20" height="20" rx="2.18"/></svg>

    <script>
      (function () {
        var STORAGE_KEY = "dashnova_workspace_projects_v1";

        var menu = document.getElementById("user-menu");
        var trigger = document.getElementById("user-trigger");
        if (trigger && menu) {
          trigger.addEventListener("click", function (e) {
            e.stopPropagation();
            var open = menu.classList.toggle("open");
            trigger.setAttribute("aria-expanded", String(open));
          });
        }
        document.addEventListener("click", function (e) {
          if (!menu || !trigger) return;
          if (e.target && menu.contains(e.target)) return;
          menu.classList.remove("open");
          trigger.setAttribute("aria-expanded", "false");
        });

        var modal = document.getElementById("new-project-modal");
        var form = document.getElementById("new-project-form");
        var nameInput = document.getElementById("new-project-name");
        var descInput = document.getElementById("new-project-desc");
        var heroBtn = document.getElementById("hero-open-new-project");
        var backdrop = modal && modal.querySelector(".new-project-modal__backdrop");
        var btnCancel = document.getElementById("new-project-cancel");

        function loadProjects() {
          try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
              var j = JSON.parse(raw);
              return Array.isArray(j) ? j : [];
            }
          } catch (e) {}
          return [];
        }

        function saveProjects(arr) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
        }

        function openNewProjectModal() {
          if (!modal || !form) return;
          form.reset();
          modal.classList.add("new-project-modal--open");
          modal.setAttribute("aria-hidden", "false");
          if (nameInput) nameInput.focus();
        }

        function closeNewProjectModal() {
          if (!modal) return;
          modal.classList.remove("new-project-modal--open");
          modal.setAttribute("aria-hidden", "true");
        }

        if (heroBtn) {
          heroBtn.addEventListener("click", function () {
            openNewProjectModal();
          });
        }

        if (btnCancel) btnCancel.addEventListener("click", closeNewProjectModal);
        if (backdrop) backdrop.addEventListener("click", closeNewProjectModal);

        if (form) {
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            if (!nameInput || !nameInput.value.trim()) {
              if (nameInput) nameInput.reportValidity();
              return;
            }
            var list = loadProjects();
            list.unshift({
              id: "p" + Date.now(),
              name: nameInput.value.trim(),
              desc: descInput ? descInput.value.trim() : "",
              scenes: 1,
              images: 0,
              videos: 0,
              updatedAt: new Date().toISOString(),
            });
            saveProjects(list);
            closeNewProjectModal();
            window.location.href = "workspace.html";
          });
        }

        document.addEventListener("keydown", function (e) {
          if (e.key !== "Escape") return;
          var pwdM = document.getElementById("self-change-password-modal");
          if (pwdM && pwdM.classList.contains("new-project-modal--open")) {
            pwdM.classList.remove("new-project-modal--open");
            pwdM.setAttribute("aria-hidden", "true");
            var pf = document.getElementById("self-change-password-form");
            if (pf) pf.reset();
            return;
          }
          if (modal && modal.classList.contains("new-project-modal--open")) {
            closeNewProjectModal();
          }
        });

        (function () {
          var pwdModal = document.getElementById("self-change-password-modal");
          var pwdForm = document.getElementById("self-change-password-form");
          var changePwdLink = document.getElementById("user-menu-open-change-password");
          if (!pwdModal || !pwdForm) return;
          var pwdBackdrop = pwdModal.querySelector(".new-project-modal__backdrop");
          var pwdCancel = document.getElementById("self-change-pwd-cancel");
          var pwdNew = document.getElementById("self-change-pwd-new");
          var pwdNew2 = document.getElementById("self-change-pwd-new2");
          function closePwdModal() {
            pwdModal.classList.remove("new-project-modal--open");
            pwdModal.setAttribute("aria-hidden", "true");
            pwdForm.reset();
            if (pwdNew2) pwdNew2.setCustomValidity("");
          }
          function openPwdModal() {
            pwdForm.reset();
            if (pwdNew2) pwdNew2.setCustomValidity("");
            pwdModal.classList.add("new-project-modal--open");
            pwdModal.setAttribute("aria-hidden", "false");
            var cur = document.getElementById("self-change-pwd-current");
            if (cur) cur.focus();
          }
          if (changePwdLink && menu && trigger) {
            changePwdLink.addEventListener("click", function (e) {
              e.preventDefault();
              e.stopPropagation();
              menu.classList.remove("open");
              trigger.setAttribute("aria-expanded", "false");
              openPwdModal();
            });
          }
          if (pwdBackdrop) pwdBackdrop.addEventListener("click", closePwdModal);
          if (pwdCancel) pwdCancel.addEventListener("click", closePwdModal);
          pwdForm.addEventListener("submit", function (e) {
            e.preventDefault();
            if (pwdNew2) pwdNew2.setCustomValidity("");
            if (pwdNew && pwdNew2 && pwdNew.value !== pwdNew2.value) {
              pwdNew2.setCustomValidity("两次输入的新密码不一致");
              pwdNew2.reportValidity();
              return;
            }
            if (!pwdForm.checkValidity()) {
              pwdForm.reportValidity();
              return;
            }
            closePwdModal();
          });
        })();
      })();
    </script>
